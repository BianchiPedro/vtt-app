<div class="h-full flex-1 overflow-hidden relative bg-neutral-900"
     (wheel)="onWheel($event)"
     (mousedown)="onMouseDown($event)">

  <div #mapContainer
       class="w-[2000px] h-[2000px] absolute bg-neutral-800 flex items-center justify-center"
       [style.transform]="'translate3d(' + panX + 'px, ' + panY + 'px, 0px) scale(' + zoomLevel + ')'"
       style="transform-origin: 0 0; will-change: transform;"
       (dragover)="onDragOver($event)"
       (drop)="onDrop($event)">

    <img src="assets/map1-sepia150.jpg"
         class="shadow-2xl absolute inset-0 w-full h-full object-cover pointer-events-none">

    @if (isSelecting) {
      <div class="absolute border-2 border-sky-500 bg-sky-500/20 z-50 pointer-events-none"
           [style.left.px]="selectionBox.left"
           [style.top.px]="selectionBox.top"
           [style.width.px]="selectionBox.width"
           [style.height.px]="selectionBox.height">
      </div>
    }

    @for (token of tokensNoMapa; track token.tokenId) {
      <div class="absolute top-0 left-0 flex flex-col items-center select-none group"
           [class.cursor-grabbing]="isDraggingTokens && selectedTokens.includes(token)"
           [class.cursor-grab]="!isDraggingTokens"
           [style.transform]="'translate(' + token.position.x + 'px, ' + token.position.y + 'px)'"
           (mousedown)="startTokenDrag($event, token)"
           (dblclick)="openTokenSheet($event, token)">

        <!-- Token circular -->
        <div class="rounded-full border-[3px] border-amber-600 shadow-xl shadow-black/50 overflow-hidden bg-zinc-800 relative z-10"
             [class.ring-4]="selectedTokens.includes(token)"
             [class.ring-sky-500]="selectedTokens.includes(token)"
             [style.width.px]="token.size"
             [style.height.px]="token.size">
          @if (token.image) {
            <img [src]="token.image" class="w-full h-full object-cover pointer-events-none">
          } @else {
            <mat-icon class="text-zinc-400 w-full h-full flex items-center justify-center pointer-events-none text-3xl">
              person
            </mat-icon>
          }
        </div>

        <!-- Handle de resize — canto inferior direito -->
        <div class="absolute z-20 w-3 h-3 bg-white border-2 border-amber-500 rounded-full
                    opacity-0 group-hover:opacity-100 transition-opacity cursor-nwse-resize
                    hover:bg-amber-300"
             [style.top.px]="token.size - 6"
             [style.left.px]="token.size - 6"
             (mousedown)="startTokenResize($event, token)">
        </div>

        <!-- Nome -->
        <div class="mt-1 px-2 py-[2px] bg-black/80 text-white font-bold text-[10px]
                    uppercase rounded shadow-md pointer-events-none whitespace-nowrap z-20">
          {{ token.name }}
        </div>

      </div>
    }

     <svg class="absolute inset-0 w-full h-full pointer-events-none"
         [class.z-30]="true"
         style="overflow: visible;">

      @for (stroke of drawStroke; track stroke.id) {
        <path [attr.d]="getStrokePath(stroke)"
              [attr.stroke]="stroke.color"
              stroke-width="4"
              fill="none"
              stroke-linecap="round"
              stroke-linejoin="round" />
      }

      @if (currentStroke) {
        <path [attr.d]="getStrokePath(currentStroke)"
              [attr.stroke]="currentStroke.color"
              stroke-width="4"
              fill="none"
              stroke-linecap="round"
              stroke-linejoin="round" />
      }
    </svg>

  </div>
</div>
