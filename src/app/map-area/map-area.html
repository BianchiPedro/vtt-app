<div class="h-full flex-1 overflow-hidden relative bg-neutral-900" 
     (wheel)="onWheel($event)"
     (mousedown)="startPan($event)"
     (window:mousemove)="pan($event)"
     (window:mouseup)="endPan($event)">
    
    <div class="w-[2000px] h-[2000px] absolute bg-neutral-800 flex items-center justify-center"
         [style.transform]="'translate3d(' + panX + 'px, ' + panY + 'px, 0px) scale(' + zoomLevel + ')'"
         style="will-change: transform;">
         
         <img src="assets/map1-sepia150.jpg" class="shadow-2xl">
         
    </div>
</div>
