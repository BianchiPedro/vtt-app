<div class="flex flex-col w-[750px] text-center font-serif bg-black gap-[2px] border-[3px] border-black rounded-xl text-xs my-2 mx-2 shadow-stone-900 shadow-xl hover:shadow-2xl hover:-translate-y-1 hover:scale-[1.01] transition-shadow duration-300 ease-in-out overflow-hidden" cdkDrag>
    
    <div class="flex flex-col bg-indigo-950 gap-[2px]">
        <h1 class="text-white py-1 tracking-widest text-sm font-bold cursor-grab active:cursor-grabbing" cdkDragHandle>
            NOTES
        </h1>
        
        <div class="flex flex-row flex-wrap gap-2 px-4 pt-2">
            @for (page of pages; track page.id) {
                <button (click)="activePageId = page.id"
                        (contextmenu)="openMenu($event, page.id); $event.stopPropagation()"
                        [class]="activePageId === page.id ? 'bg-white text-indigo-950 font-bold z-10 scale-105 shadow-md' : 'bg-indigo-900 text-gray-400 opacity-70 hover:opacity-100 hover:-translate-y-1 transition-all'"
                        class="rounded-t-lg px-4 py-2 min-w-[3rem] relative flex items-center justify-center">
                    
                    @if (editTabId === page.id) {
                        <input type="text" [(ngModel)]="page.name"
                               (blur)="saveName()"
                               (keydown.enter)="saveName()"
                               (click)="$event.stopPropagation()"
                               class="w-16 bg-zinc-200 text-black text-center outline-none border border-indigo-500 rounded px-1">
                    } @else {
                        <span>{{ page.name }}</span>
                    }
                </button>
            }
        </div>

        <div class="bg-white p-2 rounded-b-lg rounded-tr-lg mx-2 mb-2 relative z-0 h-[650px]">
            @if (pages.length > 0) {
                <textarea [ngModel]="getActiveContent()" 
                          (ngModelChange)="setActiveContent($event)"
                          class="w-full h-[300px] bg-transparent text-black text-base font-serif p-2 outline-none resize-none">
                </textarea>
            } @else {
                <div class="w-full h-[300px] flex items-center justify-center text-gray-400 italic font-sans text-base">
                    Nenhuma nota encontrada. Clique no + para criar uma nova página!
                    <button (click)="createPage()" class="text-left px-3 py-2 hover:bg-sky-700 transition-colors flex items-center gap-2">
                        <mat-icon>add</mat-icon>
                    </button>
                </div>
            }
        </div>
    </div>
</div>

@if (showContextMenu) {
    <div [style.left.px]="menuX" 
         [style.top.px]="menuY"
         class="fixed z-50 bg-zinc-800 border-2 border-zinc-950 rounded-md shadow-2xl flex flex-col w-36 py-1 text-sm font-sans text-white overflow-hidden">
        
        <button (click)="createPage()" class="text-left px-3 py-2 hover:bg-sky-700 transition-colors flex items-center gap-2">
            <mat-icon>add</mat-icon>Nova Página
        </button>

        <button (click)="startRename()" class="text-left px-3 py-2 hover:bg-sky-700 transition-colors flex items-center gap-2">
            <mat-icon>edit</mat-icon>Renomear
        </button>
        
        <hr class="border-zinc-700 my-1">
        
        <button (click)="deletePage()" class="text-left px-3 py-2 hover:bg-red-800 transition-colors flex items-center gap-2 text-red-300 hover:text-white">
            <mat-icon>delete</mat-icon>Apagar
        </button>
    </div>
}
