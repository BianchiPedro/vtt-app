<div class="bg-zinc-300 w-full shadow-2xl rounded-sm border-[12px] border-neutral-900 overflow-hidden flex flex-col resize" 
    cdkDrag cdkDragRootElement=".cdk-overlay-pane" 
    [class.h-full]="!isMinimized">
    
    <div class="flex flex-row items-center justify-between cursor-grab active:cursor-grabbing w-full bg-zinc-950 px-4 py-2 flex-none" cdkDragHandle>
        
        <div class="flex-row gap-2" [style.display]="isMinimized ? 'none' : 'flex'">
            <button class="flex items-center justify-center bg-sky-950 hover:bg-sky-800 transition rounded-md p-1 text-white">
                <mat-icon class="material-symbols-outlined">cell_tower</mat-icon>
            </button>
            <button class="flex items-center justify-center hover:bg-sky-800 transition rounded-t-lg p-1 text-white" (click)="activeTab = 'main'"
                [class]="activeTab === 'main' ? 'bg-sky-900 text-neutral-900 font-bold pb-2 translate-y-2' : 'bg-zinc-700 text-gray-400 translate-y-4' ">
                <p>Ficha Principal</p>
            </button>
            <button class="flex items-center justify-center hover:bg-sky-800 transition rounded-t-lg  p-1 text-white" (click)="activeTab = 'second'"
                [class]="activeTab === 'second' ? 'bg-sky-900 text-neutral-900 font-bold pb-2 translate-y-2' : 'bg-zinc-700 text-gray-400 translate-y-4' ">
                <p>Background e Notas</p>
            </button>
        </div>
        
        <div class="flex flex-row items-center justify-center gap-3 font-bold text-lg" [class.mr-40]="!isMinimized">
            <img src="assets/images.jpg" class="rounded-full w-8 h-8"/>
            <p class="text-white">{{ data?.name || 'NOVO PERSONAGEM' }}</p>
        </div>
        
        <div class="flex flex-row ml-4">
            <button [style.display]="isMinimized ? 'none' : 'flex'" class="items-center justify-center bg-sky-950 hover:bg-sky-800 transition rounded-md p-1 text-white mx-[1px]">
                <mat-icon class="material-symbols-outlined">manage_accounts</mat-icon>
            </button>
            <button (click)="toggleMinimized()" class="flex items-center justify-center bg-sky-950 hover:bg-sky-800 transition rounded-md p-1 text-white mx-[1px]">
                <mat-icon class="material-symbols-outlined">{{ isMinimized ? 'open_in_full' : 'remove' }}</mat-icon>
            </button>
            <button (click)="closeModal()" class="flex items-center justify-center bg-sky-950 hover:bg-red-800 transition rounded-md p-1 text-red-500 hover:text-white mx-[1px]">
                <mat-icon class="material-symbols-outlined">close</mat-icon>
            </button>
        </div>
    </div>
    
    <div class="flex-1 overflow-y-auto p-1 flex-row flex-wrap gap-4 items-start content-start justify-center relative bg-zinc-300" 
         [style.display]="isMinimized ? 'none' : 'flex'">
        
        <div [style.display]="activeTab === 'main' ? 'flex' : 'none'" class="flex-row flex-wrap gap-1 items-start content-start w-full justify-center">
            <app-character-image></app-character-image>
            <app-character-basics></app-character-basics>
            <app-character-backpack></app-character-backpack>
            <app-character-relations></app-character-relations>
            <app-character-status></app-character-status>
            <app-character-theme></app-character-theme>
            <app-character-theme></app-character-theme>
            <app-character-theme></app-character-theme>
            <app-spells></app-spells>
        </div>

        <div [style.display]="activeTab === 'second' ? 'flex' : 'none'" class="flex-row flex-wrap gap-2 items-start content-start w-full text-white text-center justify-center">
            <app-background></app-background>
            <app-notes></app-notes>
        </div>
    </div>

    <button (click)="saveCharacter()" 
            [style.display]="isMinimized ? 'none' : 'flex'"
            class="absolute bottom-6 right-6 z-50 items-center justify-center w-14 h-14 bg-green-700 hover:bg-green-500 text-white rounded-full shadow-[0_0_15px_rgba(0,0,0,0.5)] transition-transform hover:scale-110 active:scale-95 cursor-pointer">
        <mat-icon class="material-symbols-outlined text-3xl">save</mat-icon>
    </button>
</div>
