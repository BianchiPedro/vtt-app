<div class="flex flex-col text-center border-3 border-black w-90 bg-white text-xs my-2 mx-2">
    <div class="bg-black text-white py-1">
        <h1>NOME DO PERSONAGEM</h1>
        <input class="w-full h-8 px-2 outline-none bg-white text-center text-black text-lg font-bold">
    </div>
    <div class="grid grid-cols-2 text-center font-medium">
        <div class="border-r-2">
            <h2 class="bg-orange-400 border-b-2">Rótulos de Personagem</h2>
                @for (rotulo of [0, 1, 2, 3]; track rotulo; let i = $index) {
                <div class="flex flex-row items-center border-b border-black last:border-b-0 h-8">
                    
                    <select [(ngModel)]="rotulosSelecionados[i]"
                            class="flex-1 h-full px-1 outline-none bg-transparent appearance-none cursor-pointer">
                        <option value="" disabled selected></option>
                        @for (opcao of opcoesRotulos; track opcao.nome) {
                            <option [value]="opcao.nome">{{ opcao.nome }}</option>
                        }
                    </select>

                    <div class="w-8 h-full flex items-center justify-center border-l border-black bg-gray-100">
                        <mat-icon class="text-[16px] w-[16px] h-[16px]">
                            {{ getIcone(rotulosSelecionados[i]) }}
                        </mat-icon>
                    </div>
                    
                </div>
            }
        </div>
        <div>
            <h2 class="bg-yellow-500 border-b-2">Alinhamento</h2>
            <textarea class="flex-1 w-full p-2 outline-none resize-none bg-transparent" placeholder="Descreva seu alinhamento..."></textarea>
        </div>
    </div>
</div>
